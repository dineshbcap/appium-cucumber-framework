# =============================================================================
# iOS locators
# =============================================================================
# Format:  <page>.<element> = <strategy>=<value>
# Strategies: id | accessibilityId | xpath | className | iOSNsPredicate | iOSClassChain
#
# Screens are the real UIKitCatalog demo screens unless noted otherwise. Keys
# are looked up by com.appium.framework.locators.LocatorRepository and
# resolved by com.appium.framework.pages.BasePage#locator(String).
#
# Keys with no native iOS equivalent (Android system dialogs: date/time
# pickers, runtime permission "don't ask again", the Android dropdown popup)
# are intentionally omitted here — see locators_android.properties.
# =============================================================================

# ── AlertControlPage — "Alert Views" ────────────────────────────────────────
# Single-button ("OK") alert cell.
alert.simpleCell.description=iOS 'Simple' cell that opens a single-button ('OK') alert
alert.simpleCell=accessibilityId=Simple
# 3-button alert cell ("Choice One"/"Choice Two"/"Cancel") — the only iOS
# alert style with a real Cancel button, standing in for the confirm/dismiss flow.
alert.confirmCell.description=iOS 'Other' cell that opens the 3-button alert (Choice One/Choice Two/Cancel), standing in for the confirm/dismiss dialog flow
alert.confirmCell=accessibilityId=Other
alert.textEntryCell.description=iOS 'Text Entry' cell that opens the alert dialog with a text entry field
alert.textEntryCell=accessibilityId=Text Entry
# Cross-platform: alert's OK button.
alert.okButton.description=OK button on the currently displayed alert dialog
alert.okButton=xpath=//*[@resource-id='android:id/button1' or @name='OK']
# Cross-platform: alert's Cancel button.
alert.cancelButton.description=Cancel button on the currently displayed alert dialog
alert.cancelButton=xpath=//*[@resource-id='android:id/button2' or @name='Cancel']
# Cross-platform: any element proving an alert/dialog is on screen.
alert.displayedIndicator.description=Any element confirming an alert/dialog is currently on screen
alert.displayedIndicator=xpath=//*[@resource-id='android:id/button1' or @type='XCUIElementTypeAlert']
# Alert title/message text.
alert.title.description=Title/message text of the currently displayed alert dialog
alert.title=id=android:id/alertTitle
# Text entry field inside the prompt-style alert.
alert.promptInput.description=Text entry field inside the prompt-style alert dialog
alert.promptInput=id=io.appium.android.apis:id/username_edit

# ── AppLifecyclePage — generic main/home screen ─────────────────────────────
appLifecycle.mainScreenTitle.description=Title of the app's main/home screen, visible immediately after launch or resume
appLifecycle.mainScreenTitle=accessibilityId=UIKitCatalog
appLifecycle.textSectionButton.description=Button used to trigger an action before backgrounding the app, to test state preservation
appLifecycle.textSectionButton=accessibilityId=Text Controls
# NSPredicate rather than XPath deliberately: WDA's XPath matches against a
# cached XML snapshot that doesn't reliably invalidate across a
# terminateApp/activateApp cycle within the same WDA session — polling the
# same XPath then keeps resolving to a stale pre-terminate element reference.
# Predicate strings query the live accessibility tree directly.
appLifecycle.mainScreenIndicator.description=Indicator confirming the app's main/home screen is currently displayed, used after resume or relaunch
appLifecycle.mainScreenIndicator=iOSNsPredicate=name == 'UIKitCatalog'

# ── BiometricPage — Face ID / Touch ID authentication ───────────────────────
biometric.authenticateButton.description=Button that triggers the biometric (fingerprint/Face ID/Touch ID) authentication prompt
biometric.authenticateButton=accessibilityId=authenticateButton
biometric.promptTitle.description=Title label shown on the biometric system authentication prompt
biometric.promptTitle=accessibilityId=biometricPromptTitle
biometric.authResultLabel.description=Label displaying the biometric authentication result (success or failure)
biometric.authResultLabel=accessibilityId=authResult
biometric.cancelButton.description=Cancel button on the biometric authentication prompt
biometric.cancelButton=accessibilityId=cancelBiometric
# Cross-platform: waits for the auth result label specifically.
biometric.authResultIndicator.description=Indicator confirming the biometric authentication result label is visible
biometric.authResultIndicator=xpath=//*[@resource-id='io.appium.android.apis:id/auth_result' or @name='authResult']
# Cross-platform: confirms the authenticate button is available.
biometric.authenticateButtonIndicator.description=Indicator confirming the biometric authenticate button is available on screen
biometric.authenticateButtonIndicator=xpath=//*[@content-desc='Authenticate with Fingerprint' or @name='authenticateButton']

# ── ButtonControlPage — "Buttons" ───────────────────────────────────────────
button.normal.description=The 'Normal' button on the Buttons screen
button.normal=accessibilityId=normalButton
button.small.description=The 'Small' button on the Buttons screen
button.small=accessibilityId=smallButton
button.toggle.description=The ON/OFF toggle button on the Buttons screen
button.toggle=accessibilityId=toggleButton

# ── CheckboxControlPage ──────────────────────────────────────────────────────
checkbox.one.description=The first checkbox on the Controls screen
checkbox.one=accessibilityId=checkbox1
checkbox.two.description=The second checkbox on the Controls screen
checkbox.two=accessibilityId=checkbox2
# iOS has no native checkbox control; switches stand in for the demo.
checkbox.all.description=All checkbox widgets currently on screen
checkbox.all=className=XCUIElementTypeSwitch

# ── ClipboardPage ─────────────────────────────────────────────────────────────
clipboard.copyPlainTextButton.description='Copy Text' button that copies the screen's fixed plain-text sample to the OS clipboard
clipboard.copyPlainTextButton=accessibilityId=copyButton
clipboard.clipTextLabel.description=Label reflecting the current clipboard's text content
clipboard.clipTextLabel=accessibilityId=clipboardContent
# First (unnamed) text field on the real "Text Fields" screen, matched
# positionally — same field TextInputControlPage/KeyboardPage use.
clipboard.pasteTargetField.description=Text field used to test pasting clipboard content
clipboard.pasteTargetField=xpath=(//XCUIElementTypeTextField)[1]

# ── DatePickerControlPage ────────────────────────────────────────────────────
datePicker.showDateButton.description=Button that opens the date picker dialog
datePicker.showDateButton=accessibilityId=showDatePicker
datePicker.showTimeButton.description=Button that opens the time picker dialog
datePicker.showTimeButton=accessibilityId=showTimePicker
datePicker.dateResult.description=Label displaying the currently selected date
datePicker.dateResult=accessibilityId=dateResult
# No iOS picker-dialog automation is implemented in this page (Android-only
# system dialog widgets) — see locators_android.properties.

# ── DeepLinkPage ──────────────────────────────────────────────────────────────
deepLink.targetIndicator.description=Indicator element visible only on the deep-linked target screen
deepLink.targetIndicator=accessibilityId=deepLinkTarget
deepLink.pageTitle.description=Heading of the currently displayed screen, used to verify which screen a deep link opened
deepLink.pageTitle=accessibilityId=pageTitle
# Cross-platform: confirms the deep-linked target screen is displayed.
deepLink.targetDisplayedIndicator.description=Indicator confirming the deep-linked target screen is displayed
deepLink.targetDisplayedIndicator=xpath=//*[@text='Deep Link Target' or @name='deepLinkTarget']

# ── DropdownControlPage — "Spinner"-equivalent pickers ──────────────────────
dropdown.spinner1.description=The first ('Color:') spinner/dropdown on the Spinner screen
dropdown.spinner1=accessibilityId=spinner1
dropdown.spinner2.description=The second ('Planet:') spinner/dropdown on the Spinner screen
dropdown.spinner2=accessibilityId=spinner2
# No iOS popup-item locator is implemented (dropdown.item is Android-only).

# ── GestureControlPage ───────────────────────────────────────────────────────
gesture.draggableItem.description=The draggable item on the Drag and Drop screen
gesture.draggableItem=accessibilityId=draggableItem
gesture.dropZone.description=The drop zone target on the Drag and Drop screen
gesture.dropZone=accessibilityId=dropZone
gesture.result.description=Result label showing the outcome of a drag-and-drop gesture
gesture.result=accessibilityId=gestureResult
# Root table used as the swipe target on iOS — no drag/drop screen exists
# there, so mobile:swipe just needs any responsive scroll view.
gesture.iosSwipeTable.description=Root scrollable table used as an iOS swipe target, since no dedicated drag/drop screen exists there
gesture.iosSwipeTable=className=XCUIElementTypeTable

# ── ListControlPage ───────────────────────────────────────────────────────────
list.view.description=The main list view container
list.view=accessibilityId=mainList
list.scrollable.description=The scrollable list/table container
list.scrollable=className=XCUIElementTypeTable
list.items.description=The rows/items within the list
list.items=className=XCUIElementTypeCell

# ── LocatorStrategyPage — locator-strategy reference/demo fields ───────────
locatorStrategy.textNavItem.description=Navigation entry point into the Text screens, demonstrating a dual-platform locator
locatorStrategy.textNavItem=accessibilityId=Text Fields
locatorStrategy.textItem.description=A text item located via resource ID (Android) / accessibility ID (iOS)
locatorStrategy.textItem=id=text1Label
locatorStrategy.firstListItem.description=The first item in the list, located via a raw XPath expression
locatorStrategy.firstListItem=xpath=//XCUIElementTypeTable/XCUIElementTypeCell[1]

# ── OrientationPage ───────────────────────────────────────────────────────────
orientation.label.description=Label showing the current device orientation reported by the app
orientation.label=accessibilityId=orientationLabel
orientation.landscapeContent.description=Content that appears only when the device is in landscape orientation
orientation.landscapeContent=accessibilityId=landscapeContent
orientation.portraitContent.description=Content that appears only when the device is in portrait orientation
orientation.portraitContent=accessibilityId=portraitContent
orientation.landscapeIndicator.description=Indicator confirming landscape-specific content is currently visible
orientation.landscapeIndicator=xpath=//*[@resource-id='io.appium.android.apis:id/landscape_content' or @name='landscapeContent']
orientation.portraitIndicator.description=Indicator confirming portrait-specific content is currently visible
orientation.portraitIndicator=xpath=//*[@resource-id='io.appium.android.apis:id/portrait_content' or @name='portraitContent']

# ── PermissionPage — iOS system permission alerts ───────────────────────────
permission.allowButton.description=Allow button on the runtime permission dialog
permission.allowButton=xpath=//XCUIElementTypeButton[@name='Allow' or @name='Allow While Using App' or @name='OK' or @name='Continue']
permission.allowWhileUsingButton.description=Button/option that grants the permission 'While Using the App'
permission.allowWhileUsingButton=xpath=//XCUIElementTypeButton[@name='Allow While Using App' or @name='While Using the App']
permission.allowAlwaysButton.description=Button/option that grants the permission 'Always'/'All the time'
permission.allowAlwaysButton=xpath=//XCUIElementTypeButton[@name='Always Allow' or @name='Always']
permission.denyButton.description=Deny/Don't Allow button on the runtime permission dialog
permission.denyButton=xpath=//XCUIElementTypeButton[@name="Don't Allow" or @name='Deny']
# No "don't ask again" concept on iOS — permission.dontAskAgainCheckbox is Android-only.

# ── RadioButtonControlPage ────────────────────────────────────────────────────
radio.one.description=The first radio button in the radio group
radio.one=accessibilityId=radioButton1
radio.two.description=The second radio button in the radio group
radio.two=accessibilityId=radioButton2
radio.all.description=All radio button widgets currently on screen
radio.all=className=XCUIElementTypeRadioButton

# ── SliderControlPage — "Sliders" ───────────────────────────────────────────
# Single unnamed UISlider; its own "value" attribute reports position as a
# percentage string (e.g. "42%") — no separate progress label exists on iOS.
slider.seekBar.description=The slider/seek bar control
slider.seekBar=className=XCUIElementTypeSlider
slider.progressLabel.description=Label displaying the slider's current numeric progress value
slider.progressLabel=className=XCUIElementTypeSlider

# ── SwitchControlPage ─────────────────────────────────────────────────────────
switch.standard.description=The standard on/off switch
switch.standard=accessibilityId=standardSwitch
switch.defaultOn.description=The switch that defaults to the 'on' state
switch.defaultOn=accessibilityId=defaultOnSwitch
switch.monitored.description=The switch whose state changes are monitored/reported by the app
switch.monitored=accessibilityId=monitoredSwitch
switch.all.description=All switch widgets currently on screen
switch.all=className=XCUIElementTypeSwitch

# ── TextInputControlPage / KeyboardPage / ClipboardPage — "Text Fields" ────
# Neither iOS text field carries an accessibility id, so both are matched
# positionally: the plain field is the first XCUIElementTypeTextField in
# document order (a second, unrelated search-style field appears later).
textInput.textField.description=Plain single-line text input field with placeholder text
textInput.textField=xpath=(//XCUIElementTypeTextField)[1]
textInput.passwordField.description=Password-masked text input field
textInput.passwordField=className=XCUIElementTypeSecureTextField
keyboard.textField.description=Text field that triggers the on-screen keyboard on focus
keyboard.textField=xpath=(//XCUIElementTypeTextField)[1]

# ── WebViewControlPage — hybrid webview sample ids ──────────────────────────
webView.urlBar.description=The webview's URL address bar
webView.urlBar=id=url_bar
webView.content.description=The webview's page content container
webView.content=id=webview_content
# No iOS equivalents — webView.backButton/forwardButton/reloadButton are
# Android-only native chrome ids; see locators_android.properties.
