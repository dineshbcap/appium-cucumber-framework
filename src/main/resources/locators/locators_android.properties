# =============================================================================
# Android locators
# =============================================================================
# Format:  <page>.<element> = <strategy>=<value>
# Strategies: id | accessibilityId | xpath | className | androidUIAutomator
#
# Screens are the real ApiDemos (io.appium.android.apis) demo screens unless
# noted otherwise. Keys are looked up by com.dinesh.healing.LocatorRepository
# and resolved by com.appium.framework.pages.BasePage#locator(String).
# =============================================================================

# ── AlertControlPage — "App > Alert Dialogs" ────────────────────────────────
# "OK Cancel dialog with a message" button — its message occupies the title slot.
alert.twoButtonsButton.description=Android button that opens the 'OK Cancel dialog with a message' two-button alert
alert.twoButtonsButton=id=io.appium.android.apis:id/two_buttons
# "Text Entry dialog" button — has real username/password EditText fields.
alert.textEntryButton.description=Android button that opens the alert dialog with real username/password text entry fields
alert.textEntryButton=id=io.appium.android.apis:id/text_entry_button
# Cross-platform: alert's OK button.
alert.okButton.description=OK button on the currently displayed alert dialog
alert.okButton=xpath=//*[@resource-id='android:id/button1' or @name='OK']
# Cross-platform: alert's Cancel button.
alert.cancelButton.description=Cancel button on the currently displayed alert dialog
alert.cancelButton=xpath=//*[@resource-id='android:id/button2' or @name='Cancel']
# Cross-platform: any element proving an alert/dialog is on screen.
alert.displayedIndicator.description=Any element confirming an alert/dialog is currently on screen
alert.displayedIndicator=xpath=//*[@resource-id='android:id/button1' or @type='XCUIElementTypeAlert']
# Alert title/message text (this dialog style has no separate message element).
alert.title.description=Title/message text of the currently displayed alert dialog
alert.title=id=android:id/alertTitle
# Text entry field inside the prompt-style alert.
alert.promptInput.description=Text entry field inside the prompt-style alert dialog
alert.promptInput=id=io.appium.android.apis:id/username_edit

# ── AppLifecyclePage — generic main/home screen ─────────────────────────────
# Main screen title, visible immediately after launch or resume.
appLifecycle.mainScreenTitle.description=Title of the app's main/home screen, visible immediately after launch or resume
appLifecycle.mainScreenTitle=xpath=//*[@text='API Demos']
# Button used to trigger an action before backgrounding, to test state preservation.
appLifecycle.textSectionButton.description=Button used to trigger an action before backgrounding the app, to test state preservation
appLifecycle.textSectionButton=accessibilityId=Text
# Resume indicator confirming the app has returned to the main screen.
appLifecycle.mainScreenIndicator.description=Indicator confirming the app's main/home screen is currently displayed, used after resume or relaunch
appLifecycle.mainScreenIndicator=xpath=//*[@text='API Demos']

# ── BiometricPage — fingerprint/biometric authentication ────────────────────
# Button that triggers the biometric authentication prompt.
biometric.authenticateButton.description=Button that triggers the biometric (fingerprint/Face ID/Touch ID) authentication prompt
biometric.authenticateButton=accessibilityId=Authenticate with Fingerprint
# Label shown on the biometric system prompt.
biometric.promptTitle.description=Title label shown on the biometric system authentication prompt
biometric.promptTitle=accessibilityId=Confirm fingerprint
# Result label displayed after authentication success/failure.
biometric.authResultLabel.description=Label displaying the biometric authentication result (success or failure)
biometric.authResultLabel=id=io.appium.android.apis:id/auth_result
# Cancel button on the biometric prompt.
biometric.cancelButton.description=Cancel button on the biometric authentication prompt
biometric.cancelButton=accessibilityId=Cancel
# Cross-platform: waits for the auth result label specifically.
biometric.authResultIndicator.description=Indicator confirming the biometric authentication result label is visible
biometric.authResultIndicator=xpath=//*[@resource-id='io.appium.android.apis:id/auth_result' or @name='authResult']
# Cross-platform: confirms the authenticate button is available.
biometric.authenticateButtonIndicator.description=Indicator confirming the biometric authenticate button is available on screen
biometric.authenticateButtonIndicator=xpath=//*[@content-desc='Authenticate with Fingerprint' or @name='authenticateButton']

# ── ButtonControlPage — "Views > Buttons" ───────────────────────────────────
button.normal.description=The 'Normal' button on the Buttons screen
button.normal=id=io.appium.android.apis:id/button_normal
button.small.description=The 'Small' button on the Buttons screen
button.small=id=io.appium.android.apis:id/button_small
button.toggle.description=The ON/OFF toggle button on the Buttons screen
button.toggle=id=io.appium.android.apis:id/button_toggle

# ── CheckboxControlPage — "Views > Controls > 1. Light Theme" ──────────────
checkbox.one.description=The first checkbox on the Controls screen
checkbox.one=id=io.appium.android.apis:id/check1
checkbox.two.description=The second checkbox on the Controls screen
checkbox.two=id=io.appium.android.apis:id/check2
# All checkbox widgets on screen.
checkbox.all.description=All checkbox widgets currently on screen
checkbox.all=className=android.widget.CheckBox

# ── ClipboardPage — "Content > Clipboard > Data Types" ──────────────────────
# "Copy Text" button for the plain-text clipboard sample.
clipboard.copyPlainTextButton.description='Copy Text' button that copies the screen's fixed plain-text sample to the OS clipboard
clipboard.copyPlainTextButton=id=io.appium.android.apis:id/copy_plain_text
# Label reflecting the current clipboard's text content.
clipboard.clipTextLabel.description=Label reflecting the current clipboard's text content
clipboard.clipTextLabel=id=io.appium.android.apis:id/clip_text
# Real EditText on "Views > TextFields", used to test pasting.
clipboard.pasteTargetField.description=Text field used to test pasting clipboard content
clipboard.pasteTargetField=id=io.appium.android.apis:id/edit

# ── DatePickerControlPage — "Views > Date Widgets > 1. Dialog" ─────────────
datePicker.showDateButton.description=Button that opens the date picker dialog
datePicker.showDateButton=id=io.appium.android.apis:id/pickDate
datePicker.showTimeButton.description=Button that opens the time picker dialog
datePicker.showTimeButton=id=io.appium.android.apis:id/pickTime
datePicker.dateResult.description=Label displaying the currently selected date
datePicker.dateResult=id=io.appium.android.apis:id/dateDisplay
# System DatePickerDialog widgets (Android-only — no iOS equivalent screen).
datePicker.nextButton.description=Next-month navigation button on the date picker dialog
datePicker.nextButton=id=android:id/next
datePicker.prevButton.description=Previous-month navigation button on the date picker dialog
datePicker.prevButton=id=android:id/prev
datePicker.okButton.description=OK/confirm button on the date/time picker dialog
datePicker.okButton=id=android:id/button1
datePicker.cancelButton.description=Cancel button on the date/time picker dialog
datePicker.cancelButton=id=android:id/button2
datePicker.header.description=Header of the date picker dialog showing the selected date
datePicker.header=id=android:id/date_picker_header_date
# Every visible month page always has a "day 1" cell; its content-desc
# (e.g. "01 January 2026") identifies which month/year is on screen.
datePicker.firstDayCell.description=The 'day 1' cell of the currently visible month page in the date picker, used to identify which month/year is on screen
datePicker.firstDayCell=xpath=//*[starts-with(@content-desc, '01 ')]
# System TimePickerDialog widgets (Android-only).
datePicker.toggleMode.description=Button that switches the time picker from the radial clock face to typeable hour/minute fields
datePicker.toggleMode=id=android:id/toggle_mode
datePicker.hourInput.description=Hour input field on the time picker dialog (keyboard-input mode)
datePicker.hourInput=id=android:id/input_hour
datePicker.minuteInput.description=Minute input field on the time picker dialog (keyboard-input mode)
datePicker.minuteInput=id=android:id/input_minute
datePicker.amPmSpinner.description=AM/PM spinner on the time picker dialog (keyboard-input mode)
datePicker.amPmSpinner=id=android:id/am_pm_spinner

# ── DeepLinkPage — deep-linked target screen ────────────────────────────────
deepLink.targetIndicator.description=Indicator element visible only on the deep-linked target screen
deepLink.targetIndicator=xpath=//*[@text='Deep Link Target']
deepLink.pageTitle.description=Heading of the currently displayed screen, used to verify which screen a deep link opened
deepLink.pageTitle=id=io.appium.android.apis:id/page_title
# Cross-platform: confirms the deep-linked target screen is displayed.
deepLink.targetDisplayedIndicator.description=Indicator confirming the deep-linked target screen is displayed
deepLink.targetDisplayedIndicator=xpath=//*[@text='Deep Link Target' or @name='deepLinkTarget']

# ── DropdownControlPage — "Views > Spinner" ─────────────────────────────────
dropdown.spinner1.description=The first ('Color:') spinner/dropdown on the Spinner screen
dropdown.spinner1=id=io.appium.android.apis:id/spinner1
dropdown.spinner2.description=The second ('Planet:') spinner/dropdown on the Spinner screen
dropdown.spinner2=id=io.appium.android.apis:id/spinner2
# Popup dropdown item rows (Android-only UiSelector; no iOS equivalent popup).
dropdown.item.description=A row/item within an open dropdown (spinner) popup
dropdown.item=androidUIAutomator=new UiSelector().className("android.widget.CheckedTextView")

# ── GestureControlPage — "Views > Drag and Drop" ────────────────────────────
gesture.draggableItem.description=The draggable item on the Drag and Drop screen
gesture.draggableItem=id=io.appium.android.apis:id/drag_dot_1
gesture.dropZone.description=The drop zone target on the Drag and Drop screen
gesture.dropZone=id=io.appium.android.apis:id/drag_dot_2
gesture.result.description=Result label showing the outcome of a drag-and-drop gesture
gesture.result=id=io.appium.android.apis:id/drag_result_text

# ── ListControlPage — generic ListView screen ───────────────────────────────
list.view.description=The main list view container
list.view=id=android:id/list
list.scrollable.description=The scrollable list/table container
list.scrollable=className=android.widget.ListView
list.items.description=The rows/items within the list
list.items=xpath=//android.widget.ListView//android.widget.TextView

# ── LocatorStrategyPage — locator-strategy reference/demo fields ───────────
locatorStrategy.textNavItem.description=Navigation entry point into the Text screens, demonstrating a dual-platform locator
locatorStrategy.textNavItem=accessibilityId=Text
locatorStrategy.textItem.description=A text item located via resource ID (Android) / accessibility ID (iOS)
locatorStrategy.textItem=id=io.appium.android.apis:id/text1
locatorStrategy.firstListItem.description=The first item in the list, located via a raw XPath expression
locatorStrategy.firstListItem=xpath=//android.widget.ListView/android.widget.TextView[1]

# ── OrientationPage — device rotation ───────────────────────────────────────
orientation.label.description=Label showing the current device orientation reported by the app
orientation.label=id=io.appium.android.apis:id/orientation_label
orientation.landscapeContent.description=Content that appears only when the device is in landscape orientation
orientation.landscapeContent=id=io.appium.android.apis:id/landscape_content
orientation.portraitContent.description=Content that appears only when the device is in portrait orientation
orientation.portraitContent=id=io.appium.android.apis:id/portrait_content
orientation.landscapeIndicator.description=Indicator confirming landscape-specific content is currently visible
orientation.landscapeIndicator=xpath=//*[@resource-id='io.appium.android.apis:id/landscape_content' or @name='landscapeContent']
orientation.portraitIndicator.description=Indicator confirming portrait-specific content is currently visible
orientation.portraitIndicator=xpath=//*[@resource-id='io.appium.android.apis:id/portrait_content' or @name='portraitContent']

# ── PermissionPage — Android runtime permission dialogs ─────────────────────
# Android 12+ permission dialog Allow button; resource ID varies by OS version
# so text is matched too for stability.
permission.allowButton.description=Allow button on the runtime permission dialog
permission.allowButton=xpath=//*[@resource-id='com.android.permissioncontroller:id/permission_allow_button' or @resource-id='com.android.packageinstaller:id/permission_allow_button' or @text='Allow' or @text='Allow only while using the app' or @text='While using the app']
# Location permission "while using the app" option.
permission.allowWhileUsingButton.description=Button/option that grants the permission 'While Using the App'
permission.allowWhileUsingButton=xpath=//*[@text='While using the app' or @text='Allow only while using the app']
# Location permission "all the time" option.
permission.allowAlwaysButton.description=Button/option that grants the permission 'Always'/'All the time'
permission.allowAlwaysButton=xpath=//*[@text='Allow all the time' or @text='Always allow']
permission.denyButton.description=Deny/Don't Allow button on the runtime permission dialog
permission.denyButton=xpath=//*[@resource-id='com.android.permissioncontroller:id/permission_deny_button' or @resource-id='com.android.packageinstaller:id/permission_deny_button' or @text='Deny' or @text='Don\\'t allow']
# "Don't ask again" checkbox shown before a repeated deny (Android-only).
permission.dontAskAgainCheckbox.description='Don't ask again' checkbox on the Android permission dialog
permission.dontAskAgainCheckbox=xpath=//*[@resource-id='com.android.permissioncontroller:id/dont_ask_again' or @text="Don't ask again"]

