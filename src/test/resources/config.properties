# ─── Platform ─────────────────────────────────────────────────────────────────
# Supported: android | ios
platform=android

# ─── Appium Server ────────────────────────────────────────────────────────────
appium.server.url=http://127.0.0.1:4723

# ─── Android Capabilities ─────────────────────────────────────────────────────
android.sdk.root=/Users/dineshkumarpandiyaraj/Library/Android/sdk
android.platformVersion=16
android.deviceName=emulator-5554
android.udid=emulator-5554
android.app=apps/ApiDemos-debug.apk
android.appPackage=io.appium.android.apis
android.appActivity=io.appium.android.apis.ApiDemos
android.automationName=UiAutomator2
android.noReset=false
android.fullReset=false
android.newCommandTimeout=60
android.autoGrantPermissions=true

# ─── iOS Capabilities ─────────────────────────────────────────────────────────
ios.platformVersion=17.0
ios.deviceName=iPhone 15
ios.udid=auto
ios.app=apps/UIKitCatalog.app
ios.bundleId=com.example.apple-samplecode.UIKitCatalog
ios.automationName=XCUITest
ios.noReset=false
ios.wdaLocalPort=8100

# ─── Parallel Execution ───────────────────────────────────────────────────────
# Number of parallel threads
parallel.thread.count=4

# ─── Timeouts (seconds) ───────────────────────────────────────────────────────
implicit.wait=5
explicit.wait=15
page.load.timeout=30
script.timeout=30

# ─── Screenshots ──────────────────────────────────────────────────────────────
screenshot.on.failure=true
screenshot.dir=target/screenshots

# ─── Reports ──────────────────────────────────────────────────────────────────
reports.dir=target/extent-reports

# ─── Screen Recording ──────────────────────────────────────────────────────────
# Enable/disable screen recording during tests (saved on failure)
recording.enabled=false
recording.dir=target/recordings
# Maximum recording duration in seconds (Android hard limit: 180s)
recording.max.duration.seconds=180

# ─── Retry ────────────────────────────────────────────────────────────────────
# Number of times to retry a failed test (0 = no retry)
test.retry.count=1

# ─── File Transfer ────────────────────────────────────────────────────────────
# Directory on test machine for pulled device files
file.transfer.local.dir=target/device-files

# ─── Location ─────────────────────────────────────────────────────────────────
# Default mock GPS coordinates (San Francisco, CA)
mock.location.latitude=37.7749
mock.location.longitude=-122.4194
mock.location.altitude=10.0

# ─── iOS Specific ─────────────────────────────────────────────────────────────
# Allow biometric (Touch ID / Face ID) simulation on iOS Simulator
ios.allowTouchIdEnroll=true
# Automatically accept all iOS system alerts (permission dialogs, etc.)
ios.autoAcceptAlerts=false
ios.autoDismissAlerts=false
