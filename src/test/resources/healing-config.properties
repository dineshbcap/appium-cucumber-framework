# Self-healing locator configuration (com.dinesh.healing / HealingSupport).
# Every key can be overridden per-run with a -D system property,
# e.g. mvn test -Dhealing.failOnHeal=true
#
# Deliberately named "healing-config.properties" rather than the library's own
# bundled "healing.properties" so classpath resource lookup can't accidentally
# pick up the library's copy instead of this project's.

# Master switch for the entire healing layer. When false, a broken locator
# fails immediately instead of attempting to heal.
healing.enabled=true

# When true, a successful heal still fails the step with HealedLocatorException —
# use this on PR-gate jobs so a heal is visible/actionable, not silently swallowed.
# Recommended: false for nightly regression, true for PR-gate jobs.
healing.failOnHeal=false

# Persistence locations (created if missing).
healing.cache.file=target/healing-cache.json
healing.report.file=target/healing-report.json

# ---- Phase 2 (LLM) - read but inactive until an LlmHealingEngine is wired ----
healing.llm.enabled=false
healing.llm.confidence.threshold=0.7
